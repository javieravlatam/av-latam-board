<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agroveca Grupo Latam · BI Platform</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --green:#7AB648;--bg:#080e09;--s1:#0f1a10;--s2:#162118;
    --text:#e8f0e9;--dim:#8fa892;--muted:#4a6050;--bdr:rgba(122,182,72,0.22);
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}

  /* FONDO */
  .bg-glow{position:fixed;inset:0;z-index:0;overflow:hidden}
  .bg-glow::before{content:'';position:absolute;top:-20%;left:50%;transform:translateX(-50%);
    width:800px;height:800px;
    background:radial-gradient(ellipse,rgba(122,182,72,0.07) 0%,transparent 65%);
    animation:pulse 6s ease-in-out infinite}
  .bg-glow::after{content:'';position:absolute;bottom:-20%;right:-10%;width:500px;height:500px;
    background:radial-gradient(ellipse,rgba(122,182,72,0.04) 0%,transparent 65%);
    animation:pulse 9s ease-in-out infinite reverse}
  @keyframes pulse{0%,100%{opacity:1;transform:translateX(-50%) scale(1)}50%{opacity:.7;transform:translateX(-50%) scale(1.1)}}
  .dots{position:fixed;inset:0;z-index:0;
    background-image:radial-gradient(circle,rgba(122,182,72,0.1) 1px,transparent 1px);
    background-size:52px 52px;
    mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black 30%,transparent 100%)}

  /* WRAPPER */
  .wrapper{position:relative;z-index:10;min-height:100vh;display:flex;
    flex-direction:column;align-items:center;justify-content:center;padding:32px 20px}

  /* CARD */
  .card{background:rgba(15,26,16,0.88);border:1px solid var(--bdr);border-radius:22px;
    padding:44px 52px;width:100%;max-width:460px;backdrop-filter:blur(20px);
    box-shadow:0 0 0 1px rgba(122,182,72,0.05),0 28px 70px rgba(0,0,0,0.55),0 0 100px rgba(122,182,72,0.04);
    animation:fadeUp .6s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  /* LOGO: sobre fondo blanco redondeado */
  .logo-wrap{
    display:flex;justify-content:center;margin-bottom:32px;
  }
  .logo-box{
    background:#ffffff;
    border-radius:14px;
    padding:16px 32px;
    box-shadow:0 2px 20px rgba(0,0,0,0.3);
    display:inline-flex;align-items:center;justify-content:center;
  }
  .logo-box img{
    width:260px;max-width:100%;
    display:block;
  }

  /* DIVISOR */
  .divider{display:flex;align-items:center;gap:12px;margin-bottom:26px}
  .divider-line{flex:1;height:1px;background:var(--bdr)}
  .divider-text{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;white-space:nowrap}

  /* BIENVENIDA */
  .welcome{text-align:center;margin-bottom:28px}
  .welcome h1{font-size:14px;font-weight:600;color:var(--text);letter-spacing:.5px;margin-bottom:6px}
  .welcome p{font-size:11px;color:var(--dim);line-height:1.6}

  /* INPUT */
  .input-wrap{position:relative;margin-bottom:14px}
  .input-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);
    color:var(--muted);font-size:14px;pointer-events:none}
  .pwd-input{width:100%;background:rgba(22,33,24,.85);border:1px solid rgba(122,182,72,.2);
    border-radius:11px;padding:14px 44px;font-family:'DM Mono',monospace;
    font-size:18px;color:var(--text);letter-spacing:5px;outline:none;
    transition:border-color .2s,box-shadow .2s}
  .pwd-input::placeholder{letter-spacing:1px;font-size:12px;color:var(--muted);font-family:'DM Sans',sans-serif}
  .pwd-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(122,182,72,.12)}
  .pwd-input.error{border-color:#E74C3C;box-shadow:0 0 0 3px rgba(231,76,60,.12);animation:shake .4s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  .eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);
    background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px;transition:color .2s}
  .eye-btn:hover{color:var(--green)}

  /* ERROR */
  .error-msg{font-size:11px;color:#E74C3C;text-align:center;height:16px;
    margin-bottom:12px;transition:opacity .2s;opacity:0}
  .error-msg.show{opacity:1}

  /* BOTÓN */
  .btn{width:100%;background:var(--green);color:var(--bg);border:none;border-radius:11px;
    padding:15px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;
    letter-spacing:1.5px;cursor:pointer;
    transition:background .2s,transform .1s,box-shadow .2s;
    box-shadow:0 4px 20px rgba(122,182,72,.28);
    display:flex;align-items:center;justify-content:center;gap:8px}
  .btn:hover{background:#8dc954;box-shadow:0 6px 28px rgba(122,182,72,.38);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
  .btn-spinner{width:15px;height:15px;border:2px solid rgba(8,14,9,.3);border-top-color:var(--bg);
    border-radius:50%;animation:spin .7s linear infinite;display:none}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* FOOTER */
  .card-footer{margin-top:22px;text-align:center;font-size:10px;color:var(--muted);line-height:1.8}
  .dot-green{display:inline-block;width:5px;height:5px;border-radius:50%;
    background:var(--green);margin-right:5px;vertical-align:middle;opacity:.7}

  /* SUCCESS */
  .success-overlay{position:fixed;inset:0;z-index:100;background:var(--bg);
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;
    opacity:0;pointer-events:none;transition:opacity .4s}
  .success-overlay.show{opacity:1;pointer-events:all}
  .success-icon{width:68px;height:68px;border-radius:50%;background:rgba(122,182,72,.12);
    border:2px solid var(--green);display:flex;align-items:center;justify-content:center;
    font-size:30px;animation:popIn .4s cubic-bezier(.175,.885,.32,1.275) both}
  @keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
  .success-text{font-size:13px;color:var(--green);letter-spacing:2px;font-weight:600}
  .success-sub{font-size:11px;color:var(--dim)}

  @media(max-width:520px){.card{padding:32px 20px}.logo-box img{width:200px}}
</style>
</head>

      <button class="eye-btn" id="eyeBtn" type="button" tabindex="-1">👁</button>
    </div>

    <div class="error-msg" id="errorMsg">Clave incorrecta. Intenta nuevamente.</div>

    <button class="btn" id="accessBtn" onclick="checkPassword()">
      <div class="btn-spinner" id="spinner"></div>
      <span id="btnText">INGRESAR A LA PLATAFORMA</span>
    </button>

    <div class="card-footer">
      <span class="dot-green"></span>Agroveca Grupo Latam · 2026<br>
      Chile · Perú · Ecuador
    </div>

  </div>
</div>

<script>
  const HASH = "7cd4374e16e78510de24a08115c3b44f6d0d72762d41054e6ef8fa0cb5e0c45b";
  let intentos = 0;

  document.getElementById('eyeBtn').addEventListener('click', () => {
    const i = document.getElementById('pwdInput');
    i.type = i.type === 'password' ? 'text' : 'password';
    document.getElementById('eyeBtn').textContent = i.type === 'password' ? '👁' : '🙈';
  });

  document.getElementById('pwdInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
    document.getElementById('errorMsg').classList.remove('show');
    document.getElementById('pwdInput').classList.remove('error');
  });

  async function sha256(msg) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function checkPassword() {
    const val = document.getElementById('pwdInput').value.trim();
    if (!val || intentos >= 5) return;
    const btn = document.getElementById('accessBtn');
    const sp  = document.getElementById('spinner');
    const tx  = document.getElementById('btnText');
    btn.disabled = true; sp.style.display = 'block'; tx.textContent = 'Verificando...';
    await new Promise(r => setTimeout(r, 700));
    const h = await sha256(val);
    if (h === HASH) {
      sessionStorage.setItem('av_auth', HASH);
      document.getElementById('successOverlay').classList.add('show');
      setTimeout(() => window.location.href = 'index.html', 1500);
    } else {
      intentos++;
      btn.disabled = false; sp.style.display = 'none'; tx.textContent = 'INGRESAR A LA PLATAFORMA';
      document.getElementById('pwdInput').value = '';
      document.getElementById('pwdInput').classList.add('error');
      const e = document.getElementById('errorMsg');
      e.textContent = intentos >= 5 ? 'Acceso bloqueado. Recarga la página.'
        : `Clave incorrecta · ${5-intentos} intento${5-intentos!==1?'s':''} restante${5-intentos!==1?'s':''}`;
      e.classList.add('show');
      setTimeout(() => document.getElementById('pwdInput').classList.remove('error'), 500);
      document.getElementById('pwdInput').focus();
    }
  }
</script>
</body>
</html>
